name: Recalculate Prode Ranking

on:
  workflow_dispatch:
    inputs:
      write_detail:
        description: "Generar detalle JSON en reports/"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: prode-ranking-recalculate
  cancel-in-progress: true

jobs:
  recalculate-ranking:
    name: Recalculate ranking only
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm install firebase-admin

      - name: Recalculate ranking from Firestore only
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ "${{ github.event.inputs.write_detail }}" = "true" ]; then
            node scripts/sync-results.mjs --apply --write-detail
          else
            node scripts/sync-results.mjs --apply
          fi

      - name: Upload detail report
        if: ${{ github.event.inputs.write_detail == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ranking-detail-safe-recalculate
          path: reports/ranking-detail-safe-recalculate.json
          if-no-files-found: ignore
